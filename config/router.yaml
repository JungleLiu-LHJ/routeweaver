storage:
  sqlitePath: .data/routeweaver.sqlite

security:
  allowlist: []
  internalPushToken: change-this-internal-push-token

wechat:
  bindingTokenTtlSeconds: 600
  mode: clawbot
  clawbot:
    enabled: true
    sessionPath: .data/clawbot-session.json
    pollIntervalMs: 1000
    loginTimeoutMs: 480000
    longPollTimeoutMs: 35000
    botType: "3"
    botAgent: HermesRouter/0.1.0

router:
  defaultMainAgentId: assistant
  stickyAgentWindowMinutes: 180
  classifier:
    enabled: true
    provider: openai-compatible
    model: gpt-4.1-mini
    timeoutMs: 2500
    maxRecentTurns: 6
    minConfidenceDirect: 0.85
    minConfidenceKeepActive: 0.7
    minMarginDirect: 0.15
    clarifyBelow: 0.55

agents:
  - agentId: assistant
    displayName: Hermes Assistant
    description: General assistant for personal planning, daily help, and long-running async tasks.
    backendKind: hermes
    backendUrl: http://127.0.0.1:8788/hermes-router/message
    restartUrl: http://127.0.0.1:8788/hermes-router/restart
    healthUrl: http://127.0.0.1:8788/health
    aliases: [main, assistant]
    capabilityTags: [assistant, planning, tasks]
    keywordHints: [plan, schedule, todo, reminder, travel, routine]
    scenarioHints: [daily planning, general assistant, async task handling]
    pushCategories: [assistant_alert]
    listed: true
    enabled: true
    isMain: true
    riskLevel: low

  - agentId: coder
    displayName: ACP Coding Agent
    description: Coding, debugging, code review, implementation, and tool-using software tasks.
    backendKind: acp
    backendUrl: http://127.0.0.1:8790/message
    restartUrl: http://127.0.0.1:8790/restart
    healthUrl: http://127.0.0.1:8790/health
    aliases: [code, coding, dev]
    capabilityTags: [coding, debugging, implementation]
    keywordHints: [bug, code, test, refactor, fix, implement]
    scenarioHints: [debugging, code generation, code review, repo work]
    pushCategories: [coding_alert]
    listed: true
    enabled: true
    riskLevel: medium

  - agentId: ops
    displayName: OpenClaw Ops Agent
    description: Operations, workflows, external connectors, and multi-step automation tasks.
    backendKind: openclaw
    backendUrl: http://127.0.0.1:8789/message
    restartUrl: http://127.0.0.1:8789/restart
    healthUrl: http://127.0.0.1:8789/health
    aliases: [ops, automation]
    capabilityTags: [ops, automation, connectors]
    keywordHints: [deploy, workflow, automation, integration, connector]
    scenarioHints: [ops workflow, automation task, connector orchestration]
    pushCategories: [ops_alert]
    listed: true
    enabled: true
    riskLevel: medium
